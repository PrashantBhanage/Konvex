spring.application.name=konvex

# Maximum distance (km) between two events for them to be considered a match
konvex.matching.max-distance-km=5.0
# Maximum time gap (seconds) between two events for them to be considered a match
konvex.matching.max-time-gap-seconds=60

# Service-to-service API key expected in the X-API-Key header.
# MUST be overridden via environment variable in real deployments; never commit a real secret.
konvex.security.api-key=change-me-override-via-env
